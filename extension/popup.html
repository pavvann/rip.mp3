<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rip.mp3</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      min-height: 120px;
      background: #121212;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid #282828;
    }

    .logo {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.3px;
      color: #1db954;
    }

    .logo span { color: #fff; }

    .header-actions { display: flex; align-items: center; gap: 8px; }

    #open-folder-btn, #settings-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #282828;
      border: none;
      color: #b3b3b3;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    #settings-btn { padding: 5px 8px; }
    #open-folder-btn:hover, #settings-btn:hover { background: #333; color: #fff; }
    #settings-btn.active { background: #333; color: #fff; }

    /* Settings panel */
    #settings-panel {
      display: none;
      padding: 14px 16px;
      border-bottom: 1px solid #282828;
      background: #181818;
    }

    #settings-panel.open { display: block; }

    .setting-row { margin-bottom: 10px; }
    .setting-row:last-of-type { margin-bottom: 12px; }

    .setting-label {
      display: block;
      font-size: 11px;
      color: #b3b3b3;
      margin-bottom: 4px;
    }

    .setting-input {
      width: 100%;
      background: #282828;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-size: 12px;
      padding: 6px 8px;
      outline: none;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    .setting-input:focus { border-color: #1db954; }

    #save-settings-btn {
      background: #1db954;
      border: none;
      color: #000;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #save-settings-btn:hover { background: #1ed760; }
    #save-settings-btn.saved { background: #535353; color: #fff; }

    #status-bar {
      padding: 8px 16px;
      font-size: 12px;
      color: #b3b3b3;
      border-bottom: 1px solid #282828;
      display: none;
    }

    #status-bar.offline { color: #f15e6c; display: block; }
    #status-bar.online  { color: #1db954; display: block; }

    #track-list {
      max-height: 340px;
      overflow-y: auto;
    }

    #track-list::-webkit-scrollbar { width: 4px; }
    #track-list::-webkit-scrollbar-track { background: transparent; }
    #track-list::-webkit-scrollbar-thumb { background: #404040; border-radius: 2px; }

    .track-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a1a;
    }

    .track-item:last-child { border-bottom: none; }

    .track-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: #1db954;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .track-check svg { display: block; }

    .track-info { flex: 1; min-width: 0; }

    .track-name {
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-meta {
      color: #b3b3b3;
      font-size: 11px;
      margin-top: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .track-date {
      color: #535353;
      font-size: 11px;
      flex-shrink: 0;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: #535353;
      line-height: 1.5;
    }

    .empty strong { display: block; color: #b3b3b3; margin-bottom: 4px; font-size: 14px; }

    footer {
      padding: 8px 16px;
      border-top: 1px solid #282828;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #535353;
      font-size: 11px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">rip<span>.mp3</span></div>
    <div class="header-actions">
      <button id="open-folder-btn">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
          <path d="M1.75 1A1.75 1.75 0 0 0 0 2.75v10.5C0 14.216.784 15 1.75 15h12.5A1.75 1.75 0 0 0 16 13.25v-8.5A1.75 1.75 0 0 0 14.25 3H7.5L5.957 1.457A1.75 1.75 0 0 0 4.713 1H1.75z"/>
        </svg>
        Open folder
      </button>
      <button id="settings-btn" title="Settings">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 4.754a3.246 3.246 0 1 0 0 6.492 3.246 3.246 0 0 0 0-6.492zM5.754 8a2.246 2.246 0 1 1 4.492 0 2.246 2.246 0 0 1-4.492 0z"/>
          <path d="M9.796 1.343c-.527-1.79-3.065-1.79-3.592 0l-.094.319a.873.873 0 0 1-1.255.52l-.292-.16c-1.64-.892-3.433.902-2.54 2.541l.159.292a.873.873 0 0 1-.52 1.255l-.319.094c-1.79.527-1.79 3.065 0 3.592l.319.094a.873.873 0 0 1 .52 1.255l-.16.292c-.892 1.64.901 3.434 2.541 2.54l.292-.159a.873.873 0 0 1 1.255.52l.094.319c.527 1.79 3.065 1.79 3.592 0l.094-.319a.873.873 0 0 1 1.255-.52l.292.16c1.64.893 3.434-.902 2.54-2.541l-.159-.292a.873.873 0 0 1 .52-1.255l.319-.094c1.79-.527 1.79-3.065 0-3.592l-.319-.094a.873.873 0 0 1-.52-1.255l.16-.292c.893-1.64-.902-3.433-2.541-2.54l-.292.159a.873.873 0 0 1-1.255-.52l-.094-.319zm-2.633.283c.246-.835 1.428-.835 1.674 0l.094.319a1.873 1.873 0 0 0 2.693 1.115l.291-.16c.764-.415 1.6.42 1.184 1.185l-.159.292a1.873 1.873 0 0 0 1.116 2.692l.318.094c.835.246.835 1.428 0 1.674l-.319.094a1.873 1.873 0 0 0-1.115 2.693l.16.291c.415.764-.42 1.6-1.185 1.184l-.291-.159a1.873 1.873 0 0 0-2.693 1.116l-.094.318c-.246.835-1.428.835-1.674 0l-.094-.319a1.873 1.873 0 0 0-2.692-1.115l-.292.16c-.764.415-1.6-.42-1.184-1.185l.159-.291A1.873 1.873 0 0 0 1.945 8.93l-.319-.094c-.835-.246-.835-1.428 0-1.674l.319-.094A1.873 1.873 0 0 0 3.06 4.474l-.16-.292c-.415-.764.42-1.6 1.185-1.184l.292.159a1.873 1.873 0 0 0 2.692-1.115l.094-.319z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="settings-panel">
    <div class="setting-row">
      <label class="setting-label">Server URL</label>
      <input id="input-server" class="setting-input" type="text" placeholder="http://localhost:7823" spellcheck="false" />
    </div>
    <div class="setting-row">
      <label class="setting-label">Secret</label>
      <input id="input-secret" class="setting-input" type="password" placeholder="leave empty for local server" spellcheck="false" />
    </div>
    <button id="save-settings-btn">Save</button>
  </div>

  <div id="status-bar"></div>

  <div id="track-list">
    <div class="empty" id="empty-state">
      <strong>No downloads yet</strong>
      Click ⬇ on any track in Spotify to start
    </div>
  </div>

  <footer>
    <span id="count-label">0 tracks downloaded</span>
    <span>rip.mp3 v1.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
